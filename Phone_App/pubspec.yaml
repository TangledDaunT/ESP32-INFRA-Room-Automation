name: openclaw_remote
description: OpenClaw Room Control Panel
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # MQTT

  # HTTP requests to OpenClaw
  http: ^1.2.0

  # BLE for direct ESP32 connection

  # Keep screen always on
  wakelock_plus: ^1.1.4

  # Persistent settings storage
  shared_preferences: ^2.2.3

  # Microphone for clap + intimacy mode

  # Runtime permissions
  permission_handler: ^11.3.1

  # Date/time formatting
  intl: ^0.19.0

  # Background foreground service (clap detection always-on)
  flutter_foreground_task: ^8.10.0

  # Google fonts (sci-fi look)
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2928.1
  record: ^6.2.0
  fftea: ^1.5.0+1
  web_socket_channel: ^3.0.3

  # Alarm sound playback
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - icons/
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-wght.ttf
